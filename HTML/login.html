<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../CSS/register.css" />
    <link rel="icon" type="image/png" href="../MULTIMEDIA/rose.png" />
  </head>
  <body>
    <div class="form">
      <form action="" onsubmit="loginUser(event)">
        <h1>Iniciar Sesión</h1><br/>
        <label class="User-text" for="usuario">Usuario:</label><b/>
        <input
          type="text"
          id="usuario"
          name="usuario"
          placeholder="Ingrese su usuario"
          class="username"
          required
        /><br />
        <label class="User-text" for="contraseña">Contraseña:</label
        ><br /><br />
        <input
          type="password"
          id="contrasena"
          name="contraseña"
          placeholder="Ingrese su contraseña"
          class="password"
          required
        /><br />
        <div class="submit-bttn">
          <button type="submit" class="submit-bttn" id="submit-bttn">
            Ingresa!
          </button>
          <label class="submit-bttn" for="submit"></label>
        </div>
      </form>
    </div>

    <script src="../JS/login.js"></script>
  </body>
</html>
