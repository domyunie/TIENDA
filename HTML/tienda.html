<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="../CSS/tienda.css">
    <link rel="icon" type="image/png" href="../MULTIMEDIA/rose.png">
</head>
<body>

    <header>
        <div class="header-inner">
            <img class="logo" src="../MULTIMEDIA/logo.png" alt="Logo Tienda Rosas">
            <h1 class="site-title">Tienda Rosas</h1>
            <div class="cart-icon" title="Ver carrito">
                 <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <nav>
      <input type="checkbox" id="menu-toggle" />
      <label class="menu-label" for="menu-toggle">☰ Menú</label>
      <ul>
        <li><a href="../HTML/inicio.html">Inicio</a></li>
        <li><a href="../HTML/tienda.html">Productos</a></li>
        <li><a href="../HTML/descuentos.html">Descuentos</a></li>
        <li><a href="../HTML/contactanos.html">Contacto</a></li>
        <li><a id="enlace-crud" href="../HTML/crud.html">Crud</a></li>
        <li><a href="../HTML/register.html">Registrate</a></li>
        <li><a href="../HTML/login.html">Inicia Sesión</a></li>
      </ul>
    </nav>
    
    <h2 class="products-title">Nuestros Productos</h2>

        <section class="products">

            <div class="product-card">
                <img src="../MULTIMEDIA/pulsera.png" alt="Grupo de pulseras goticas">
                <h3>Grupo de pulseras goticas</h3>
                <p class="precio">$8.00</p>
                <button class="add-btn" data-id="1" data-name="Grupo de pulseras goticas" data-price="8">
                    🛒 Añadir al carrito
                </button>
            </div>

            <div class="product-card">
                <img src="../multimedia/imagen2.jpg" alt="Anillos Ataúd">
                <h3>Anillos Ataúd</h3>
                <p class="precio">$5.00</p>
                <button class="add-btn" data-id="2" data-name="Anillos Ataúd" data-price="5">
                    🛒 Añadir al carrito
                </button>
            </div>

            <div class="product-card">
                <img src="../multimedia/imagen3.jpg" alt="Collar Elegante Rojo">
                <h3>Collar Elegante Rojo</h3>
                <p class="precio">$15.00</p>
                <button class="add-btn" data-id="3" data-name="Collar Elegante Rojo" data-price="15">
                    🛒 Añadir al carrito
                </button>
            </div>

            <div class="product-card">
                <img src="../multimedia/imagen4.jpg" alt="Broche Rosa Roja">
                <h3>Broche Rosa Roja</h3>
                <p class="precio">$7.00</p>
                <button class="add-btn" data-id="4" data-name="Broche Rosa Roja" data-price="7">
                    🛒 Añadir al carrito
                </button>
            </div>

        </section>


        <section class="cart-container">
            <h2>Tu Carrito</h2>
            <ul id="cart-items">
                <li class="cart-empty">El carrito está vacío.</li>
            </ul>
            <div class="total-section">
                <strong>Total: $<span id="total-price">0.00</span></strong>
                <button id="clear-cart">Vaciar carrito</button>
            </div>
        </section>

    </main>

  <script src="../JS/tienda.js"></script>
    
</body>
</html>
