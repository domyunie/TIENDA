<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../CSS/register.css" />
    <link rel="icon" type="image/png" href="../MULTIMEDIA/rose.png" />
  </head>
  <body>
    <div class="form">
      <form action="">
        <h1>Crea una cuenta!</h1>
        <br />
        <label class="User-text" for="contraseña">Nombre:</label><br /><br />
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Ingrese su nombre"
          class="name"
          required
        /><br /><br />
        <label class="User-text" for="usuario">Usuario:</label><br />
        <input
          type="text"
          id="usuario"
          name="usuario"
          placeholder="Ingrese su usuario"
          class="username"
          required
        /><br />
        <label class="User-text" for="contraseña">Contraseña:</label
        ><br /><br />
        <input
          type="password"
          id="contrasena"
          name="contraseña"
          placeholder="Ingrese su contraseña"
          class="password"
          required
        /><br />
        <div class="submit-bttn">
          <button type="submit" class="submit-bttn" id="submit-bttn">
            Crear
          </button>
          <label class="submit-bttn" for="submit"></label>
        </div>
      </form>
    </div>
    <script src="../JS/register.js"></script>
  </body>
</html>
